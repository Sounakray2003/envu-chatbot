services:
  rag-ingestion-api:
    image: doc-ingestion-api:latest
    build: .
    container_name: doc-ingestion-api
    env_file:
      - .env
    environment:
      VECTOR_STORE_ID: '${VECTOR_STORE_ID:-2}'
      PORT: '${PORT:-8094}'
      INGESTION_CONCURRENCY: '${INGESTION_CONCURRENCY:-1}'
      INGESTION_QUEUE_TIMEOUT_SECONDS: '${INGESTION_QUEUE_TIMEOUT_SECONDS:-10}'
      MAX_INGESTION_SECONDS_PER_ITEM: '${MAX_INGESTION_SECONDS_PER_ITEM:-900}'
      ADMIN_OPERATION_TIMEOUT_SECONDS: '${ADMIN_OPERATION_TIMEOUT_SECONDS:-300}'
      MAX_BATCH_FILES: '${MAX_BATCH_FILES:-10}'
      MAX_UPLOAD_BYTES: '${MAX_UPLOAD_BYTES:-26214400}'
      MAX_ZIP_FILES: '${MAX_ZIP_FILES:-100}'
      MAX_ZIP_UNCOMPRESSED_BYTES: '${MAX_ZIP_UNCOMPRESSED_BYTES:-104857600}'
      MAX_PDF_PAGES: '${MAX_PDF_PAGES:-300}'
      MAX_EXTRACTED_CHARS_PER_FILE: '${MAX_EXTRACTED_CHARS_PER_FILE:-2000000}'
      MAX_CHUNKS_PER_JOB: '${MAX_CHUNKS_PER_JOB:-1500}'
    command: uvicorn admin_api:app --host 0.0.0.0 --port 8094
    ports:
      - "8094:8094"
    networks:
      - rag-network

networks:
  rag-network:
    driver: bridge
